<!DOCTYPE html>

<html class="dark" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "error-container": "#93000a",
            "on-tertiary-fixed": "#00174b",
            "error": "#ffb4ab",
            "primary": "#d4af37",
            "surface": "#050508",
            "on-surface": "#e5e1e7",
            "on-primary-fixed": "#241a00",
            "on-tertiary-fixed-variant": "#27438a",
            "inverse-surface": "#e5e1e7",
            "on-background": "#e5e1e7",
            "surface-variant": "#353439",
            "on-surface-variant": "#d0c5af",
            "on-secondary-fixed-variant": "#47464f",
            "on-tertiary": "#082b72",
            "surface-container-low": "#0a0a12",
            "on-secondary-container": "#b9b7c3",
            "on-error-container": "#ffdad6",
            "on-error": "#690005",
            "tertiary-fixed-dim": "#b4c5ff",
            "on-primary": "#050508",
            "inverse-on-surface": "#303034",
            "surface-bright": "#39393d",
            "primary-fixed": "#ffe088",
            "on-tertiary-container": "#254188",
            "surface-container": "#131317",
            "primary-container": "#d4af37",
            "outline": "#99907c",
            "surface-container-lowest": "#050508",
            "primary-fixed-dim": "#e9c349",
            "tertiary-container": "#97b0ff",
            "tertiary": "#bfcdff",
            "tertiary-fixed": "#dbe1ff",
            "background": "#050508",
            "secondary-container": "#494852",
            "inverse-primary": "#735c00",
            "secondary-fixed": "#e4e1ed",
            "on-primary-fixed-variant": "#574500",
            "surface-tint": "#e9c349",
            "on-secondary-fixed": "#1b1b23",
            "secondary": "#c8c5d1",
            "on-secondary": "#302f39",
            "on-primary-container": "#554300",
            "outline-variant": "#1a1a2e",
            "surface-container-high": "#1f1f23",
            "secondary-fixed-dim": "#c8c5d1",
            "surface-dim": "#050508",
            "surface-container-highest": "#353439"
          },
          fontFamily: {
            "headline": ["Inter", "sans-serif"],
            "body": ["Inter", "sans-serif"],
            "label": ["Inter", "sans-serif"],
            "mono": ["JetBrains Mono", "monospace"]
          },
          borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    .glass-card {
      background: rgba(10, 10, 18, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .glass-card:hover {
      border-color: #d4af37;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body antialiased min-h-screen overflow-hidden">
<!-- Background Content (Simulated Settings/Onboarding) -->
<main class="fixed inset-0 z-0 flex flex-col p-8 opacity-20 select-none pointer-events-none">
<div class="max-w-7xl mx-auto w-full">
<div class="flex items-center justify-between mb-12">
<h1 class="font-headline font-extrabold text-3xl tracking-tighter text-primary">HUNTER TRADES</h1>
<div class="w-12 h-12 rounded-full bg-surface-container-highest"></div>
</div>
<div class="grid grid-cols-12 gap-6">
<div class="col-span-3 space-y-4">
<div class="h-10 bg-surface-container rounded-lg w-full"></div>
<div class="h-10 bg-surface-container rounded-lg w-3/4"></div>
<div class="h-10 bg-surface-container rounded-lg w-full"></div>
</div>
<div class="col-span-9 space-y-6">
<div class="h-64 bg-surface-container-low rounded-2xl w-full"></div>
<div class="grid grid-cols-2 gap-6">
<div class="h-40 bg-surface-container-low rounded-2xl"></div>
<div class="h-40 bg-surface-container-low rounded-2xl"></div>
</div>
</div>
</div>
</div>
</main>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
<!-- Modal Container -->
<div class="relative w-full max-w-2xl bg-surface-container-lowest rounded-2xl shadow-2xl overflow-hidden border border-white/5">
<!-- TopAppBar (Modal Header) -->
<header class="flex justify-between items-center w-full px-6 py-4 bg-[#0A0A12]">
<h2 class="font-headline font-bold text-xl tracking-tight text-primary">Pilih Broker</h2>
<button class="text-white/60 hover:text-primary transition-colors duration-200 Active:opacity-80 scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</header>
<!-- Content Area -->
<div class="p-8 space-y-8">
<!-- Search Bar -->
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-white/40 group-focus-within:text-primary" data-icon="search">search</span>
</div>
<input class="w-full bg-[#0D0D18] border border-[#1A1A2E] rounded-xl py-3.5 pl-12 pr-4 text-white placeholder-white/20 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all font-body text-sm" placeholder="Cari broker..." type="text"/>
</div>
<!-- Broker Grid (3 Columns) -->
<div class="grid grid-cols-3 gap-4 h-[320px] overflow-y-auto pr-2 custom-scrollbar">
<!-- Broker Card: ICMarkets -->
<button class="glass-card rounded-2xl p-6 flex flex-col items-center justify-center space-y-4 transition-all group">
<div class="w-12 h-12 rounded-full bg-surface-container-low border border-primary flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="account_balance">account_balance</span>
</div>
<span class="font-headline font-semibold text-base text-white group-hover:text-primary transition-colors">ICMarkets</span>
</button>
<!-- Broker Card: Pepperstone -->
<button class="glass-card rounded-2xl p-6 flex flex-col items-center justify-center space-y-4 transition-all group">
<div class="w-12 h-12 rounded-full bg-surface-container-low border border-primary flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="monitoring">monitoring</span>
</div>
<span class="font-headline font-semibold text-base text-white group-hover:text-primary transition-colors">Pepperstone</span>
</button>
<!-- Broker Card: OANDA -->
<button class="glass-card rounded-2xl p-6 flex flex-col items-center justify-center space-y-4 transition-all group border-primary/40 bg-primary/5">
<div class="w-12 h-12 rounded-full bg-surface-container-low border border-primary flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="currency_exchange" data-weight="fill" style="font-variation-settings: 'FILL' 1;">currency_exchange</span>
</div>
<span class="font-headline font-semibold text-base text-primary">OANDA</span>
</button>
<!-- Broker Card: XM -->
<button class="glass-card rounded-2xl p-6 flex flex-col items-center justify-center space-y-4 transition-all group">
<div class="w-12 h-12 rounded-full bg-surface-container-low border border-primary flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="show_chart">show_chart</span>
</div>
<span class="font-headline font-semibold text-base text-white group-hover:text-primary transition-colors">XM</span>
</button>
<!-- Broker Card: Exness -->
<button class="glass-card rounded-2xl p-6 flex flex-col items-center justify-center space-y-4 transition-all group">
<div class="w-12 h-12 rounded-full bg-surface-container-low border border-primary flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="analytics">analytics</span>
</div>
<span class="font-headline font-semibold text-base text-white group-hover:text-primary transition-colors">Exness</span>
</button>
<!-- Broker Card: FTMO -->
<button class="glass-card rounded-2xl p-6 flex flex-col items-center justify-center space-y-4 transition-all group">
<div class="w-12 h-12 rounded-full bg-surface-container-low border border-primary flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="military_tech">military_tech</span>
</div>
<span class="font-headline font-semibold text-base text-white group-hover:text-primary transition-colors">FTMO</span>
</button>
</div>
<!-- Footer Action -->
<div class="pt-4 border-t border-white/5">
<button class="w-full bg-primary text-on-primary font-headline font-bold py-4 rounded-xl shadow-[0_0_20px_rgba(212,175,55,0.2)] hover:opacity-90 active:scale-[0.98] transition-all tracking-wide">
            KONFIRMASI PILIHAN
          </button>
<p class="text-center text-[10px] text-white/30 uppercase tracking-[2px] mt-6 font-mono">Terminal Sec: Noir-8801</p>
</div>
</div>
</div>
</div>
<style>
    /* Custom Scrollbar for the Grid */
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #1a1a2e;
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #d4af37;
    }
  </style>
</body></html>
